version: 2
updates:
  # npm / pnpm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      prod-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # Major bumps require intentional migration
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
