version: 2
updates:
  # npm / pnpm dependencies — single group, single PR at a time
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 1
    commit-message:
      prefix: chore
      include: scope
    groups:
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      # Major bumps require intentional migration
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # GitHub Actions — single PR at a time
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    commit-message:
      prefix: chore
      include: scope
