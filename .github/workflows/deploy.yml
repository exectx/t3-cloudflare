name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "**.mdx"
      - ".gitignore"
      - ".env.example"
      - ".dev.vars.example"
      - "public/**"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  SKIP_ENV_VALIDATION: true

jobs:
  deploy:
    name: Deploy to Cloudflare
    if: github.repository == 'exectx/t3-cloudflare'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Inject D1 database ID
        run: sed -i 's/REPLACE_WITH_YOUR_DATABASE_ID/${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}/' wrangler.jsonc

      - name: Run database migrations
        run: pnpm drizzle-kit migrate
        env:
          NODE_ENV: production
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          # CLOUDFLARE_TOKEN is the env var drizzle.config.ts reads for the D1 HTTP driver
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_D1_TOKEN }}

      - name: Build & Deploy Worker
        run: pnpm run deploy
        env:
          NODE_ENV: production
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
